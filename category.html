<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop by Category | Simba Supermarket</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="container">
                <div class="top-links">
                    <span><i class="fas fa-mobile-alt"></i> Download App</span>
                    <span><i class="fas fa-globe"></i> English / RWF</span>
                </div>
                <div class="top-user-links">
                    <button id="theme-toggle" title="Toggle Light/Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="help.html">Help Center</a>
                    <a href="#">Login / Register</a>
                </div>
            </div>
        </div>
        <div class="main-header">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><h1>Simba<span>Supermarket</span></h1></a>
                </div>
                <div class="search-container">
                    <input type="text" id="cat-search" placeholder="Search in this category...">
                    <button type="submit"><i class="fas fa-search"></i></button>
                </div>
                <div class="header-icons">
                    <div class="icon-item cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="badge">0</span>
                        <span>Cart</span>
                    </div>
                </div>
            </div>
        </div>
        <nav>
            <div class="container">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="category.html?cat=Cosmetics" class="cat-link">Cosmetics</a></li>
                    <li><a href="category.html?cat=Sports" class="cat-link">Sports & Wellness</a></li>
                    <li><a href="category.html?cat=Baby" class="cat-link">Baby Products</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="category-header">
            <h2 id="category-title">All Products</h2>
            <p id="category-desc">Browse our high-quality selection of products.</p>
        </div>
        
        <div id="category-product-list" class="product-grid">
            <!-- Dynamic Category Products -->
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 Simba Supermarket. Built for Rwanda.</p>
            </div>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
