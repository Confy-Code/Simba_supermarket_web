<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart | Simba Supermarket</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="main-header">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><h1>Simba<span>Supermarket</span></h1></a>
                </div>
            </div>
        </div>
    </header>

    <main class="container page-content">
        <h2>Shopping Cart</h2>
        <div id="cart-container" class="cart-layout">
            <div id="cart-items" class="cart-items-list">
                <!-- Cart items will be loaded here -->
            </div>
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">0 RWF</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span>1,000 RWF</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="cart-total">1,000 RWF</span>
                </div>
                <button class="btn checkout-btn">Proceed to Checkout</button>
                <a href="category.html" class="view-all" style="display: block; text-align: center; margin-top: 15px;">Continue Shopping</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 Simba Supermarket. Built for Rwanda.</p>
            </div>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
