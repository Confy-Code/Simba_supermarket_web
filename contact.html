<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Simba Supermarket</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="container">
                <div class="top-links">
                    <span><i class="fas fa-mobile-alt"></i> Download App</span>
                    <span><i class="fas fa-globe"></i> English / RWF</span>
                </div>
                <div class="top-user-links">
                    <button id="theme-toggle" title="Toggle Light/Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="help.html">Help Center</a>
                    <a href="#">Login / Register</a>
                </div>
            </div>
        </div>
        <div class="main-header">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><h1>Simba<span>Supermarket</span></h1></a>
                </div>
            </div>
        </div>
    </header>

    <main class="container page-content">
        <section class="contact-section">
            <h2>Contact Us</h2>
            <div class="contact-container">
                <div class="contact-info">
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h4>Our Location</h4>
                            <p>KN 4 Ave, Kigali, Rwanda</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-phone"></i>
                        <div>
                            <h4>Call Us</h4>
                            <p>+250 788 000 000</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h4>Email Us</h4>
                            <p>support@simba.rw</p>
                        </div>
                    </div>
                </div>
                <div class="contact-form">
                    <form id="contactForm">
                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Your Email" required>
                        <input type="text" placeholder="Subject">
                        <textarea placeholder="Your Message" rows="5" required></textarea>
                        <button type="submit" class="btn">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-bottom">
            <div class="container">
                <p>&copy; 2026 Simba Supermarket. Built for Rwanda.</p>
            </div>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
